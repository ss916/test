#proxies:


proxy-groups:
- name: 🎯代理
  type: select
  proxies:
    - 故障切换
    - 延迟最低
    - 负载均衡
  use:
    - test

#直连=gfwlist，代理=chinalist，默认直连gfwlist
- name: ❓其他流量
  type: select
  proxies:
    - ➡️直连 #markgfwlistorchinalist1
    - 🎯代理 #markgfwlistorchinalist2
    - ❎屏蔽
  use:
    - test

- name: 故障切换
  type: fallback
  use: #usemark
    - test

- name: 延迟最低
  type: url-test
  use: #usemark
    - test

- name: 负载均衡
  type: load-balance
  strategy: round-robin #consistent-hashing 默认，同个请求域名走同个节点。round-robin 随机轮询
  use: #usemark
    - test

