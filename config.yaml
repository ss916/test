external-controller: 0.0.0.0:8000
secret: "123a456"
external-ui: clash-dashboard-gh-pages
mode: rule
port: 8001  
mixed-port: 8005
redir-port: 8002
allow-lan: true
bind-address: "*"
log-level: info
ipv6: true


hosts:
  '+.crashlytics.com':  127.0.0.1
  '+.flurry.com': 127.0.0.1


dns:
  enable: true
  listen: 0.0.0.0:5300
  ipv6: true #markdns
  enhanced-mode: redir-host #markdns
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - localhost.ptlogin2.qq.com
  default-nameserver:
    - 119.29.29.29
  nameserver:
    - https://223.5.5.5/dns-query
    #- tls://223.6.6.6:853
    #- https://doh.pub/dns-query
    - https://dns.pub/dns-query
    #- tls://doh.pub:853
    #- tls://dns.pub:853
  fallback:
    - tls://8.8.4.4:853
    - https://1.0.0.1/dns-query
    - tls://101.101.101.101:853
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4


proxies:
- name: 網易云解鎖
  type: http
  server: 127.0.0.1
  port: 1235


proxy-providers:
#mark订阅1
#mark订阅2
#mark文件1
#mark文件2

  #在线订阅模板:
    #type: http
    #url: http://192.168.1.1:331/link1.txt
    #interval: 30000
    #path: ./在线订阅模板.txt
    #health-check:
      #enable: true
      #interval: 600
      #url: http://clients1.google.com/generate_204

  #本地文件模板:
    #type: file
    #interval: 30000
    #path: ./本地文件模板.txt
    #health-check:
      #enable: true
      #interval: 600
      #url: http://clients2.google.com/generate_204

proxy-groups:
- name: 代理
  type: select
  proxies:
    - 故障切换
    - 延迟最低
    #- 负载
  use:
    - 订阅1
    - 订阅2

- name: 故障切换
  type: fallback
  use:
    - 订阅1
    - 订阅2

- name: 延迟最低
  type: url-test
  use:
    - 订阅1
    - 订阅2

#- name: 负载
  #type: load-balance
  #use:
    #- 订阅1
    #- 订阅2

#直连=gfwlist，代理=chinalist，默认直连gfwlist
